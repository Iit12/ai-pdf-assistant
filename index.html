<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Assistant</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 1rem; text-align: center; width: 400px; border: 1px solid #334155; }
        h1 { color: #38bdf8; }
        .drop-zone { border: 2px dashed #38bdf8; padding: 2rem; border-radius: 0.5rem; margin: 1rem 0; cursor: pointer; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF Assistant</h1>
        <p>Upload a document to start chatting</p>
        
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            Click to select PDF
            <input type="file" id="fileInput" hidden accept=".pdf">
        </div>

        <button onclick="uploadFile()">Upload & Process</button>
        <div id="status">Ready to upload</div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            
            if (!fileInput.files[0]) {
                alert("Please select a file first!");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            status.innerText = "Uploading to Render...";

            try {
                const response = await fetch('https://ai-pdf-assistant-backend-99c7.onrender.com/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                status.innerText = data.message;
                status.style.color = "#10b981";
            } catch (error) {
                status.innerText = "Error connecting to backend";
                status.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
